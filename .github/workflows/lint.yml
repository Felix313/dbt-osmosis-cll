name: lint

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 2
      - name: Set up Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.10"
      - name: Upgrade pip
        run: |
          pip install --constraint=.github/workflows/constraints.txt pip
          pip --version
      - name: Install uv
        run: |
          pip install --constraint=.github/workflows/constraints.txt uv
          uv --version
      - name: Install pre-commit
        run: |
          uv pip install --system pre-commit
          pre-commit --version
      # Lint only the changed range: the repo baseline is not ruff-clean (legacy
      # findings inherited from the forks), so --all-files would always fail.
      # Tighten to --all-files once the baseline is cleaned up.
      - name: Run pre-commit on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pre-commit run --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD
          else
            pre-commit run --from-ref HEAD^ --to-ref HEAD
          fi
